name: Keepalive Workflow

on:
  schedule:
    - cron: "0 0 * * 1" # 每週一執行一次 (UTC 00:00)
  workflow_dispatch: # 允許手動觸發

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive Workflow
        uses: gautamkrishnar/keepalive-workflow@v2
        with:
          use_api: true # 優先使用 GitHub API 來重新啟用 Workflow
